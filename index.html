<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Deep Reasoning Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* For custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; /* slate-600 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }

      /* Animation for pop-ups */
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out forwards;
      }

      /* Animation for progress bars */
      @keyframes progress-bar-fill {
        from {
          width: 0%;
        }
      }
      .animate-progress-bar {
        animation: progress-bar-fill 0.8s ease-out forwards;
      }

      /* --- NEW: Neon Glow Effects --- */
      .glow-pending {
        box-shadow: 0 0 3px rgba(100, 116, 139, 0.4);
        transition: box-shadow 0.3s ease-in-out;
      }
      .glow-completed {
        box-shadow: 0 0 5px #22c55e, 0 0 10px #22c55e;
        transition: box-shadow 0.3s ease-in-out;
      }
      .glow-skipped {
        box-shadow: 0 0 5px #64748b, 0 0 10px #64748b;
        transition: box-shadow 0.3s ease-in-out;
      }
      .glow-error {
        box-shadow: 0 0 6px #ef4444, 0 0 12px #ef4444;
        transition: box-shadow 0.3s ease-in-out;
      }
      .glow-active {
        animation: pulse-glow-blue 1.5s infinite ease-in-out;
      }

      @keyframes pulse-glow-blue {
        0%, 100% {
          box-shadow: 0 0 7px rgba(59, 130, 246, 0.9), 0 0 14px rgba(59, 130, 246, 0.8);
        }
        50% {
          box-shadow: 0 0 14px rgba(96, 165, 250, 1), 0 0 28px rgba(96, 165, 250, 1);
        }
      }

      /* --- NEW: Thunderbolt animations --- */
      @keyframes thunder-creep-1 {
        0%, 100% { transform: translate(-12px, -12px) rotate(-45deg) scale(1); }
        50% { transform: translate(-18px, -18px) rotate(-50deg) scale(1.1); }
      }
      @keyframes thunder-creep-2 {
        0%, 100% { transform: translate(12px, 12px) rotate(25deg) scale(1); }
        50% { transform: translate(18px, 18px) rotate(30deg) scale(1.1); }
      }
      @keyframes thunder-creep-3 {
        0%, 100% { transform: translate(10px, -14px) rotate(70deg) scale(1); }
        50% { transform: translate(15px, -20px) rotate(75deg) scale(1.1); }
      }
      .thunderbolt-1 {
          animation: thunder-creep-1 3.5s ease-in-out infinite;
      }
      .thunderbolt-2 {
          animation: thunder-creep-2 3.0s ease-in-out infinite 0.3s;
      }
      .thunderbolt-3 {
          animation: thunder-creep-3 3.2s ease-in-out infinite 0.6s;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",

  }
}
</script>

</head>

</html>
